<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C2185B" />
    <title>ADORE — Fine Jewellery</title>

    <!-- SEO -->
    <meta name="description" content="ADORE Fine Jewellery — BIS Hallmarked gold & IGI certified diamonds. Free shipping on all orders." />
    <meta name="keywords" content="gold jewellery, diamond rings, silver jewellery, BIS hallmark, IGI certified, India" />

    <!-- Open Graph -->
    <meta property="og:title" content="ADORE Fine Jewellery" />
    <meta property="og:description" content="Handcrafted BIS Hallmarked gold & IGI certified diamonds." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=1200&auto=format&fit=crop&q=80" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Preconnect for images -->
    <link rel="preconnect" href="https://images.unsplash.com" />

    <style>
      html { scroll-behavior: smooth; }
      body { margin: 0; -webkit-font-smoothing: antialiased; background: #fff; }
      #root { min-height: 100vh; }
      /* Prevent layout flash while fonts load */
      body { font-family: 'Jost', system-ui, sans-serif; }
    </style>

    <!-- Payment SDKs — load async so they don't block render -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" async></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
